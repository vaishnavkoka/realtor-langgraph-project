name: smartsense
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas=2.3.3
  - sqlalchemy=2.0.44
  - requests=2.32.5
  - aiohttp=3.13.2
  - beautifulsoup4=4.14.2
  - openpyxl=3.1.5
  - plotly=6.4.0
  - seaborn==0.13.2
  - streamlit=1.51.0
  - uvicorn=0.38.0
  - fastapi=0.121.0
  - pytorch
  - transformers=4.57.1
  - redis-py=7.0.1
  # Install remaining packages via pip to avoid conflicts
  - pip:
    - python-dotenv==1.1.0
    - faiss-cpu==1.12.0
    - groq==0.33.0
    - langchain==0.2.16
    - langchain-core==0.2.43
    - langchain-text-splitters==0.2.4
    - langchain-community==0.2.16
    - langchain-groq==0.1.9
    - langchain-huggingface==0.0.3
    - langgraph==0.1.19
    - psycopg2-binary==2.9.11
    - pypdf2==3.0.1
    - reportlab==4.4.3
    - sentence-transformers==5.1.2
    - tavily-python==0.7.12
    - tiktoken==0.12.0
    - cohere==5.20.0
    - matplotlib==3.10.7